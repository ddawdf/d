<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار الحصين الخارق 🛡️</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0f172a; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .box { 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 15px; 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        h2 { color: #38bdf8; font-size: 22px; margin-bottom: 20px; }
        .question { display: none; } 
        .active { display: block; }
        button { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            background: transparent; 
            border: 2px solid #38bdf8; 
            color: #fff; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.3s ease;
            text-align: center;
        }
        button:hover { 
            background: #38bdf8; 
            color: #0f172a; 
            box-shadow: 0 0 15px #38bdf8;
        }
        .result-box { display: none; }
        .percentage { font-size: 54px; font-weight: bold; color: #38bdf8; margin: 20px 0; }
    </style>
</head>
<body>

<div class="box">
    <!-- صندوق الأسئلة التفاعلية -->
    <div id="quiz-box">
        <h2>🛡️ اختبار صديقي المحمي بالسيرفر</h2>
        
        <div class="question active" id="q1">
            <p>1. كم عمري؟ 🤔</p>
            <button onclick="saveAnswer('q1', 'A')">18 سنة</button>
            <button onclick="saveAnswer('q1', 'B')">أنت</button>
            <button onclick="saveAnswer('q1', 'C')">22 سنة</button>
        </div>

        <div class="question" id="q2">
            <p>2. من عم سالم؟ 🧔</p>
            <button onclick="saveAnswer('q2', 'A')">أبو فهد</button>
            <button onclick="saveAnswer('q2', 'B')">خالد</button>
            <button onclick="saveAnswer('q2', 'C')">دحوم</button>
        </div>

        <div class="question" id="q3">
            <p>3. وش اختباري بكرة؟ 📝</p>
            <button onclick="saveAnswer('q3', 'A')">رياضيات</button>
            <button onclick="saveAnswer('q3', 'B')">انقليزي</button>
            <button onclick="saveAnswer('q3', 'C')">فيزياء</button>
        </div>
    </div>

    <!-- صندوق عرض النتيجة النهائية القادمة من السيرفر -->
    <div id="result-box" class="result-box">
        <h2>📊 النتيجة النهائية الآمنة</h2>
        <div class="percentage" id="score-display">0%</div>
        <p style="color: #94a3b8; font-size: 14px;">تم حساب النتيجة وفحصها بالكامل داخل السيرفر السحابي بأمان 🔒</p>
    </div>
</div>

<script>
// كبسولة الحماية المغلقة (الدرع البرمجي)
(function() {
    let userAnswers = {};

    window.saveAnswer = function(qId, choice) {
        userAnswers[qId] = choice; // حفظ الرمز النصي فقط (A, B, C)
        
        let currentNum = parseInt(qId.replace('q', ''));
        document.getElementById('q' + currentNum).classList.remove('active');
        
        let nextElem = document.getElementById('q' + (currentNum + 1));
        if (nextElem) {
            nextElem.classList.add('active');
        } else {
            sendToBackend(); // إرسال حزمة الاختيارات عند نهاية الأسئلة
        }
    };

    function sendToBackend() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-display').innerText = "جاري الحساب...";

        // 🚀 الاتصال بالسيرفر السحابي الحقيقي والمحمي الخاص بك
        fetch('https://onrender.com', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answers: userAnswers })
        })
        .then(res => res.json())
        .then(data => {
            // استقبال النسبة المئوية الآمنة وعرضها على الشاشة
            document.getElementById('score-display').innerText = data.percentage + "%";
        })
        .catch((err) => {
            console.error("خطأ:", err);
            document.getElementById('score-display').innerText = "خطأ في الاتصال";
        });
    }
})();
</script>
</body>
</html>
