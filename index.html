<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الصداقة المطور 🌟</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
            background-color: #0b0c10; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: #fff;
        }
        .quiz-container { 
            background-color: #1f2833; padding: 30px; border-radius: 20px; 
            box-shadow: 0px 10px 30px rgba(0,255,204,0.1); width: 100%; max-width: 500px; text-align: center;
        }
        h1 { color: #66fcf1; font-size: 24px; margin-bottom: 25px; }
        .question, .screen { font-size: 18px; margin-bottom: 20px; display: none; line-height: 1.6; }
        .active { display: block; }
        .answers-grid { display: flex; flex-direction: column; gap: 12px; }
        button, input { 
            padding: 14px; border-radius: 10px; border: 2px solid #45f3ff; background-color: transparent; 
            color: #fff; font-size: 16px; cursor: pointer; transition: 0.3s ease;
        }
        input { width: 100%; text-align: center; margin-bottom: 15px; outline: none; }
        input:focus { box-shadow: 0 0 10px #45f3ff; }
        button:hover { background-color: #45f3ff; color: #000; font-weight: bold; box-shadow: 0 0 15px #45f3ff; }
        .result-box { display: none; }
        .result-box h2 { color: #66fcf1; font-size: 28px; }
        .percentage { font-size: 48px; font-weight: bold; color: #45f3ff; margin: 20px 0; }
        .restart-btn { 
            background-color: #66fcf1; color: #000; font-weight: bold; border: none; 
            width: 100%; margin-top: 15px; text-align: center;
        }
        .restart-btn:hover { background-color: #45f3ff; box-shadow: 0 0 15px #66fcf1; }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- الشاشة الأولى: إدخال الاسم (مصابة بالثغرة عمداً) -->
    <div class="screen active" id="start-screen">
        <h1>✨ مرحباً بك في اختبار الصداقة ✨</h1>
        <p style="margin-bottom: 15px;">الرجاء كتابة اسمك للبدء:</p>
        <input type="text" id="username" placeholder="اكتب اسمك هنا">
        <button style="width: 100%; text-align: center;" onclick="startQuiz()">ابدأ الاختبار 🚀</button>
    </div>

    <!-- صندوق الأسئلة (مخفي ويظهر بعد إدخال الاسم) -->
    <div id="quiz-box" style="display: none;">
        <!-- نص الترحيب الذي تظهر فيه الثغرة -->
        <div id="welcome-message" style="font-size: 20px; color: #66fcf1; margin-bottom: 20px; font-weight: bold;"></div>
        
        <div class="question active" id="q1">
            <p>1. كم عمري؟ 🤔</p>
            <div class="answers-grid">
                <button onclick="processAnswer(1, 'A')">18 سنة</button>
                <button onclick="processAnswer(1, 'B')">أنت (تعرف عمري بالضبط)</button>
                <button onclick="processAnswer(1, 'C')">22 سنة</button>
            </div>
        </div>

        <div class="question" id="q2">
            <p>2. من عم سالم؟ 🧔</p>
            <div class="answers-grid">
                <button onclick="processAnswer(2, 'A')">أبو فهد</button>
                <button onclick="processAnswer(2, 'B')">خالد</button>
                <button onclick="processAnswer(2, 'C')">دحوم</button>
            </div>
        </div>

        <div class="question" id="q3">
            <p>3. وش اختباري بكرة؟ 📝</p>
            <div class="answers-grid">
                <button onclick="processAnswer(3, 'A')">رياضيات</button>
                <button onclick="processAnswer(3, 'B')">انقليزي</button>
                <button onclick="processAnswer(3, 'C')">فيزياء</button>
            </div>
        </div>
    </div>

    <!-- صندوق النتيجة النهائية -->
    <div id="result-box" class="result-box">
        <h2>📊 تقرير الصداقة والتحليل</h2>
        <div class="percentage" id="score-percent">0%</div>
        <p id="analysis-text" style="font-size: 16px; line-height: 1.6; color: #c5c6c7;"></p>
        <button class="restart-btn" onclick="restartQuiz()">إعادة الاختبار 🔄</button>
    </div>
</div>

<script>
(function() {
    let totalScore = 0;
    const maxScore = 150; 
    let playerName = "";

    // دالة بدء الاختبار واستقبال الاسم
    window.startQuiz = function() {
        playerName = document.getElementById('username').value;
        // تم تصحيح التحقق هنا ليعمل على المتصفحات بشكل سليم
        if (!playerName || playerName.trim() === "") {
            alert("الرجاء كتابة اسمك أولاً!");
            return;
        }

        // إخفاء شاشة البداية وإظهار الأسئلة
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('quiz-box').style.display = 'block';

        // ❌ الثغرة موجودة هنا! استخدام innerHTML سينفذ الكود الخبيث فوراً
        document.getElementById('welcome-message').innerHTML = "كفو يا " + playerName + "، ورنا كم تجيب!";
    };

    window.processAnswer = function(questionNum, choice) {
        let points = 10; 
        if (questionNum === 1 && choice === 'B') { points = 50; } 
        else if (questionNum === 2 && choice === 'C') { points = 50; } 
        else if (questionNum === 3 && choice === 'B') { points = 50; } 

        totalScore += points;
        
     document.getElementById('welcome-message').innerText = "كفو يا " + playerName + "، ورنا كم تجيب!";
        let nextQ = questionNum + 1;
        let nextElem = document.getElementById('q' + nextQ);
        
        if (nextElem) {
            nextElem.classList.add('active');
        } else {
            showResult();
        }
    };

    function showResult() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        
        let percentage = Math.round((totalScore / maxScore) * 100);
        document.getElementById('score-percent').innerText = percentage + "%";
        
        let analysis = "";
        if (percentage >= 90) {
            analysis = "🥇 خويي الأسطوري! تعرف عني كل صغيرة وكبيرة وجاوبت صح 100%.";
        } else if (percentage >= 60) {
            analysis = "🥈 كفو، جاوبت على بعض الأشياء صح، بس يبغالك تركز بخصوصي أكثر!";
        } else {
            analysis = "⚠️ أفا! شكل المعلومات ضاعت منك. ركز معي المرة الجاية!";
        }
        document.getElementById('analysis-text').innerText = analysis;
    }

    window.restartQuiz = function() {
        totalScore = 0;
        document.getElementById('result-box').style.display = 'none';
        document.getElementById('start-screen').classList.add('active');
        document.getElementById('username').value = "";
        document.getElementById('q1').classList.add('active');
        document.getElementById('q2').classList.remove('active');
        document.getElementById('q3').classList.remove('active');
    };
})();
</script>
</body>
</html>
